name: "Full CI/CD"
jobs:
  - name: "setup"
    steps:
      - name: Install dependencies
        plugin: dbt@v1
        command: dbt deps
  - name: "build"
    steps:
      - name: Run models
        plugin: dbt@v1
        command: dbt run
  - name: "test"
    steps:
      - name: Run tests
        plugin: dbt@v1
        command: dbt test
      - name: Check source freshness
        plugin: dbt@v1
        command: dbt source freshness
  - name: "deploy"
    steps:
      - name: Notify deployment
        plugin: command@v1
        command: echo "Deployment complete"
  - name: "teardown"
    type: "cleanup"
    steps:
      - name: Run teardown
        plugin: command@v1
        command: echo "TEARDOWN"
